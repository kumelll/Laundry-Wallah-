<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register — Laundry Wallah</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/auth.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <a href="index.html" class="back-home">← Back to Home</a>
      <div class="auth-header">
        <div class="logo">Laundry <span>Wallah</span></div>
        <h1>Create Account</h1>
        <p>Join Laundry Wallah and schedule your first pickup</p>
      </div>
      <form class="auth-form" id="registerForm">
        <div class="form-group">
          <label for="name">Full Name</label>
          <input type="text" id="name" name="name" placeholder="Your name" required>
        </div>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="you@example.com" required>
        </div>
        <div class="form-group">
          <label for="phone">Phone</label>
          <input type="tel" id="phone" name="phone" placeholder="10-digit mobile number">
        </div>
        <div class="form-group">
          <label for="address">Address</label>
          <input type="text" id="address" name="address" placeholder="Pickup & delivery address">
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="••••••••" required>
        </div>
        <p id="regError" style="color: #dc2626; font-size: 0.9rem; margin-bottom: 0.5rem; display: none;"></p>
        <button type="submit" class="btn-submit">Register</button>
      </form>
      <div class="auth-footer">
        Already have an account? <a href="login.html">Login</a>
      </div>
    </div>
  </div>
  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script>
    document.getElementById('registerForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      const errEl = document.getElementById('regError');
      errEl.style.display = 'none';
      const btn = e.target.querySelector('.btn-submit');
      btn.disabled = true;
      btn.textContent = 'Creating account…';
      try {
        await api('/auth/register', {
          method: 'POST',
          body: JSON.stringify({
            name: document.getElementById('name').value.trim(),
            email: document.getElementById('email').value.trim().toLowerCase(),
            phone: (document.getElementById('phone').value || '').trim(),
            address: (document.getElementById('address').value || '').trim(),
            password: document.getElementById('password').value
          }),
          headers: { 'Content-Type': 'application/json' }
        });
        window.location.href = 'login.html';
      } catch (err) {
        btn.disabled = false;
        btn.textContent = 'Register';
        const msg = err.message || (err.name === 'TypeError' ? 'Cannot connect to server. Run "npm start" and open http://localhost:3000' : 'Registration failed');
        errEl.textContent = msg;
        errEl.style.display = 'block';
      }
    });
  </script>
</body>
</html>
