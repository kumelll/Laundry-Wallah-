<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Laundry Wallah</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/auth.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <a href="index.html" class="back-home">← Back to Home</a>
      <div class="auth-header">
        <div class="logo">Laundry <span>Wallah</span></div>
        <h1>User Login</h1>
        <p>Sign in to place orders and track your laundry</p>
      </div>
      <form class="auth-form" id="loginForm">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="you@example.com" required>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="••••••••" required>
        </div>
        <p id="loginError" style="color: #dc2626; font-size: 0.9rem; margin-bottom: 0.5rem; display: none;"></p>
        <button type="submit" class="btn-submit">Login</button>
      </form>
      <div class="auth-footer">
        Don't have an account? <a href="register.html">Register</a><br>
        <span style="margin-top: 0.75rem; display: inline-block;">Staff? <a href="admin/login.html">Admin Login</a></span>
      </div>
    </div>
  </div>
  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script>
    document.getElementById('loginForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      const errEl = document.getElementById('loginError');
      errEl.style.display = 'none';
      const btn = e.target.querySelector('.btn-submit');
      btn.disabled = true;
      btn.textContent = 'Signing in…';
      try {
        const res = await api('/auth/login', {
          method: 'POST',
          body: JSON.stringify({
            email: document.getElementById('email').value.trim().toLowerCase(),
            password: document.getElementById('password').value
          }),
          headers: { 'Content-Type': 'application/json' }
        });
        setToken(res.token);
        window.location.href = 'user/dashboard.html';
      } catch (err) {
        btn.disabled = false;
        btn.textContent = 'Login';
        const msg = err.message || (err.name === 'TypeError' ? 'Cannot connect to server. Run "npm start" in the project folder and open http://localhost:3000' : 'Login failed');
        errEl.textContent = msg;
        errEl.style.display = 'block';
      }
    });
  </script>
</body>
</html>
