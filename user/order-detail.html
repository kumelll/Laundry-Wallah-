<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order Detail — Laundry Wallah</title>
  <link rel="stylesheet" href="../css/styles.css">
  <link rel="stylesheet" href="../css/dashboard.css">
</head>
<body>
  <div class="dashboard-layout">
    <header class="dash-header">
      <a href="../index.html" class="logo">Laundry <span>Wallah</span></a>
      <nav class="dash-nav">
        <a href="dashboard.html">Dashboard</a>
        <a href="orders.html">My Orders</a>
        <a href="new-order.html">Place Order</a>
        <a href="../index.html">Logout</a>
      </nav>
    </header>

    <main class="dash-main">
      <a href="orders.html" class="back-home" style="display: inline-block; margin-bottom: 1rem;">← Back to Orders</a>
      <h1 class="dash-title" id="orderTitle">Order #LW-</h1>
      <p id="orderDates" style="margin-bottom: 2rem; color: var(--gray);"></p>

      <div class="status-timeline" id="statusTimeline" style="margin-bottom: 2rem;">
      </div>

      <div class="order-card" style="flex-direction: column; align-items: flex-start;">
        <h3 style="margin-bottom: 1rem;">Items</h3>
        <table id="itemsTable" style="width: 100%; border-collapse: collapse;">
        </table>
      </div>
    </main>
  </div>

  <script src="../js/config.js"></script>
  <script src="../js/api.js"></script>
  <script>
    const STATUS_CLASS = {
      pending: 'status-pending', pickup_scheduled: 'status-pickup', clothes_picked_up: 'status-pickup',
      washing_completed: 'status-washing', out_for_delivery: 'status-delivery', delivered: 'status-delivered'
    };
    const STATUS_LABEL = {
      pending: 'Pending', pickup_scheduled: 'Pickup Scheduled', clothes_picked_up: 'Clothes Picked Up',
      washing_completed: 'Washing Completed', out_for_delivery: 'Out for Delivery', delivered: 'Delivered'
    };

    const urlParams = new URLSearchParams(window.location.search);
    const orderId = urlParams.get('id');

    if (!orderId || !getToken()) {
      window.location.href = 'orders.html';
    } else {
      (async function() {
        try {
          const order = await api('/orders/' + orderId);
          document.getElementById('orderTitle').textContent = 'Order #LW-' + order.id;
          document.getElementById('orderDates').textContent = `Pickup: ${order.pickup_date} ${order.pickup_slot} · Drop: ${order.drop_date} ${order.drop_slot}`;

          const statuses = ['pending', 'pickup_scheduled', 'clothes_picked_up', 'washing_completed', 'out_for_delivery', 'delivered'];
          const currentIndex = statuses.indexOf(order.status);
          const timeline = statuses.map((s, i) => {
            const done = i < currentIndex;
            const active = i === currentIndex;
            return `<span class="status-dot ${done ? 'done' : active ? 'active' : ''}"></span> <span${active ? ' style="font-weight: bold;"' : ''}>${STATUS_LABEL[s]}</span>`;
          }).join(' ');
          document.getElementById('statusTimeline').innerHTML = timeline;

          let total = 50; // delivery fee
          const rows = order.items.map(item => {
            const subtotal = item.price_per_item * item.quantity;
            total += subtotal;
            return `<tr><td>${item.name} × ${item.quantity}</td><td style="text-align: right;">₹${subtotal}</td></tr>`;
          });
          rows.push(`<tr><td>Pickup & Delivery</td><td style="text-align: right;">₹50</td></tr>`);
          rows.push(`<tr><td><strong>Total</strong></td><td style="text-align: right;"><strong>₹${total}</strong></td></tr>`);
          document.getElementById('itemsTable').innerHTML = rows.join('');
        } catch (err) {
          if (err.message.includes('401') || err.message.includes('Authentication')) {
            clearToken();
            window.location.href = '../login.html';
          } else {
            document.querySelector('.dash-main').innerHTML = '<p style="color: #dc2626;">Failed to load order. ' + err.message + '</p>';
          }
        }
      })();
    }
  </script>
</body>
</html>
