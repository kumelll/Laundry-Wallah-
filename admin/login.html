<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login — Laundry Wallah</title>
  <link rel="stylesheet" href="../css/styles.css">
  <link rel="stylesheet" href="../css/auth.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <a href="../index.html" class="back-home">← Back to Home</a>
      <div class="auth-header">
        <div class="logo">Laundry <span>Wallah</span></div>
        <h1>Admin Login</h1>
        <p>Manage orders and update delivery status</p>
      </div>
      <form class="auth-form" id="adminLoginForm">
        <div class="form-group">
          <label for="email">Admin Email</label>
          <input type="email" id="email" name="email" placeholder="admin@laundrywallah.com" required>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="••••••••" required>
        </div>
        <p id="loginError" style="color: #dc2626; font-size: 0.9rem; margin-bottom: 0.5rem; display: none;"></p>
        <button type="submit" class="btn-submit">Login</button>
      </form>
      <div class="auth-footer">
        Customer? <a href="../login.html">User Login</a>
      </div>
    </div>
  </div>

  <script src="../js/config.js"></script>
  <script src="../js/api.js"></script>
  <script>
    document.getElementById('adminLoginForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      const errEl = document.getElementById('loginError');
      errEl.style.display = 'none';
      const btn = e.target.querySelector('.btn-submit');
      btn.disabled = true;
      btn.textContent = 'Signing in…';
      try {
        const res = await api('/auth/admin/login', {
          method: 'POST',
          body: JSON.stringify({
            email: document.getElementById('email').value.trim().toLowerCase(),
            password: document.getElementById('password').value
          }),
          headers: { 'Content-Type': 'application/json' }
        });
        setAdminToken(res.token);
        window.location.href = 'dashboard.html';
      } catch (err) {
        btn.disabled = false;
        btn.textContent = 'Login';
        errEl.textContent = err.message || 'Invalid admin credentials';
        errEl.style.display = 'block';
      }
    });
  </script>
</body>
</html>
