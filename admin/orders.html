<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Orders — Laundry Wallah</title>
  <link rel="stylesheet" href="../css/styles.css">
  <link rel="stylesheet" href="../css/dashboard.css">
</head>
<body>
  <div class="dashboard-layout">
    <header class="dash-header">
      <a href="dashboard.html" class="logo">Laundry <span>Wallah</span> Admin</a>
      <nav class="dash-nav">
        <a href="dashboard.html">Dashboard</a>
        <a href="orders.html">Orders</a>
        <a href="login.html" id="logoutLink">Logout</a>
      </nav>
    </header>

    <main class="dash-main">
      <a href="dashboard.html" class="back-home" style="display: inline-block; margin-bottom: 1rem;">← Back to Dashboard</a>
      <h1 class="dash-title">All Orders</h1>
      <p style="margin-bottom: 2rem; color: var(--gray);">View and update order status for customer orders.</p>

      <div id="ordersContainer">
        <p style="color: var(--gray);">Loading orders…</p>
      </div>

      <div style="margin-top: 2rem; padding: 1rem; background: #f8fafc; border-radius: 0.5rem; font-size: 0.9rem; color: var(--gray);">
        <strong>Status flow:</strong> Pending → Pickup Scheduled → Clothes Picked Up → Washing Completed → Out for Delivery → Delivered
      </div>
    </main>
  </div>

  <script src="../js/config.js"></script>
  <script src="../js/api.js"></script>
  <script>
    const STATUS_LABEL = {
      pending: 'Pending',
      pickup_scheduled: 'Pickup Scheduled',
      clothes_picked_up: 'Clothes Picked Up',
      washing_completed: 'Washing Completed',
      out_for_delivery: 'Out for Delivery',
      delivered: 'Delivered'
    };
    const STATUS_CLASS = {
      pending: 'status-pending',
      pickup_scheduled: 'status-pickup',
      clothes_picked_up: 'status-pickup',
      washing_completed: 'status-washing',
      out_for_delivery: 'status-delivery',
      delivered: 'status-delivered'
    };

    document.getElementById('logoutLink').addEventListener('click', function(e) {
      e.preventDefault();
      clearAdminToken();
      window.location.href = 'login.html';
    });

    if (!getAdminToken()) {
      window.location.href = 'login.html';
    } else {
      loadOrders();
    }

    async function loadOrders() {
      try {
        const orders = await api('/admin/orders', {}, true);
        const container = document.getElementById('ordersContainer');
        if (orders.length === 0) {
          container.innerHTML = '<p style="color: var(--gray);">No orders yet. Orders placed by customers will appear here.</p>';
          return;
        }
        container.innerHTML = `
          <table class="admin-table">
            <thead>
              <tr>
                <th>Order ID</th>
                <th>Customer</th>
                <th>Pickup Slot</th>
                <th>Drop Slot</th>
                <th>Total</th>
                <th>Status</th>
                <th>Update</th>
              </tr>
            </thead>
            <tbody>
              ${orders.map(o => {
                const statusOpts = ['pending', 'pickup_scheduled', 'clothes_picked_up', 'washing_completed', 'out_for_delivery', 'delivered']
                  .map(s => `<option value="${s}" ${o.status === s ? 'selected' : ''}>${STATUS_LABEL[s]}</option>`).join('');
                const disabled = o.status === 'delivered' ? ' disabled' : '';
                return `
                  <tr>
                    <td>#LW-${o.id}</td>
                    <td>${o.user_name || '—'}<br><small style="color: var(--gray);">${o.user_email || '—'}</small></td>
                    <td>${o.pickup_date} ${o.pickup_slot}</td>
                    <td>${o.drop_date} ${o.drop_slot}</td>
                    <td>₹${o.total_amount}</td>
                    <td><span class="order-status ${STATUS_CLASS[o.status] || 'status-pending'}">${STATUS_LABEL[o.status] || o.status}</span></td>
                    <td>
                      <select class="status-select" data-order-id="${o.id}" onchange="updateStatus(this)"${disabled}>
                        <option value="">— Update —</option>
                        ${statusOpts}
                      </select>
                    </td>
                  </tr>`;
              }).join('')}
            </tbody>
          </table>`;
      } catch (err) {
        if (err.message.includes('401') || err.message.includes('403') || err.message.includes('Authentication') || err.message.includes('Admin')) {
          clearAdminToken();
          window.location.href = 'login.html';
        } else {
          document.getElementById('ordersContainer').innerHTML = '<p style="color: #dc2626;">Failed to load orders. ' + err.message + '</p>';
        }
      }
    }

    async function updateStatus(select) {
      const value = select.value;
      if (!value) return;
      const orderId = select.getAttribute('data-order-id');
      try {
        await api('/admin/orders/' + orderId + '/status', {
          method: 'PATCH',
          body: JSON.stringify({ status: value }),
          headers: { 'Content-Type': 'application/json' }
        }, true);
        const row = select.closest('tr');
        const statusCell = row.querySelector('td:nth-child(6)');
        statusCell.innerHTML = '<span class="order-status ' + (STATUS_CLASS[value] || 'status-pending') + '">' + (STATUS_LABEL[value] || value) + '</span>';
        if (value === 'delivered') {
          select.disabled = true;
        }
      } catch (err) {
        alert('Failed to update: ' + err.message);
      }
    }
  </script>
</body>
</html>
